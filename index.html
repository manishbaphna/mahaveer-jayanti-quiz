        :root {

            --accent: #FF5722;

            margin: 0;
            background: radial-gradient(circle, var(--white) 0%, #fdf2e9 100%);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--white);
            max-width: 700px;
            width: 100%;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            border: 1px solid rgba(184, 134, 11, 0.2);
            overflow: hidden;
            position: relative;
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Elegant Header & Image */
        .hero-section {
            background: linear-gradient(to bottom, #fff4e6, var(--white));
            padding: 40px 20px;
            border-bottom: 3px double var(--saffron);
        }

        .hero-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--saffron);
            box-shadow: 0 10px 20px rgba(255, 153, 51, 0.3);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Lora', serif;
            color: var(--deep-gold);
            font-size: 2rem;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .tagline {
            font-style: italic;
            color: #777;
            font-family: 'Lora', serif;
        }

        /* Quiz Logic UI */
        .content-padding { padding: 30px; }
        .hidden { display: none; }

        .btn-start {
            background: linear-gradient(45deg, var(--saffron), var(--accent));
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 87, 34, 0.4);
        }

        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 87, 34, 0.6); }

        .options-container { display: grid; gap: 15px; margin-top: 25px; }
        .option {
            padding: 15px 20px;
            border: 1px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--cream);
            font-weight: 500;
        }
        .option:hover { background: #fff4e6; border-color: var(--saffron); color: var(--accent); }
        .option.selected { background: var(--saffron); color: white; border-color: var(--saffron); }

        .timer { font-size: 1.2rem; font-weight: 600; color: var(--accent); margin-bottom: 10px; }
        
        /* Result Screen */
        .score-box { font-size: 3rem; color: var(--deep-gold); font-family: 'Lora', serif; margin: 20px 0; }
        .review-box { text-align: left; max-height: 400px; overflow-y: auto; margin-top: 20px; padding: 10px; background: #fafafa; border-radius: 15px; }
        .review-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .correct { color: #2e7d32; }
        .incorrect { color: #d32f2f; }

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let timer;
    let timeLeft = 120; // Increased to 90s for more questions
    let userAnswers = [];

    function startQuiz() {
        // Randomize 15 questions from the bank
        currentQuestions = questionBank.sort(() => 0.5 - Math.random()).slice(0, 15);
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
        startTimer();
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = `Time Left: ${timeLeft}s`;
            if (timeLeft <= 0) endQuiz();
        }, 1000);
    }

    function loadQuestion() {
        const qData = currentQuestions[currentIndex];
        document.getElementById('progress').innerText = `Question ${currentIndex + 1} of 15`;
        document.getElementById('question-text').innerText = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData.a.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectOption(i);
            container.appendChild(div);
        });
    }

    function selectOption(index) {
        userAnswers[currentIndex] = index;
        if (currentIndex < 14) {
            currentIndex++;
            loadQuestion();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        clearInterval(timer);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        score = 0;
        userAnswers.forEach((ans, i) => {
            if (ans === currentQuestions[i].cor) score++;
        });
        document.getElementById('score-display').innerText = `${score}/15`;
    }

    function showReview() {
        const list = document.getElementById('review-list');
        list.classList.remove('hidden');
        list.innerHTML = '';
        currentQuestions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.cor;
            list.innerHTML += `
                <div class="review-item">
                    <p><strong>${i+1}. ${q.q}</strong></p>
                    <p class="${isCorrect ? 'correct' : 'incorrect'}">Your answer: ${q.a[userAnswers[i]] || 'No answer'}</p>
                    ${!isCorrect ? `<p class="correct">Correct: ${q.a[q.cor]}</p>` : ''}
                </div>
            `;
        });
    }
