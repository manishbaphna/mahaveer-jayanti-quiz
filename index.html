<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahaveer Jayanti Quiz - Celebrate the Light of Knowledge</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --saffron: #FF9933;
            --deep-gold: #B8860B;
            --cream: #FFFDF5;
            --white: #FFFFFF;
            --text: #3E2723;
            --accent: #FF5722;
        }

        body {
            margin: 0;
            background: radial-gradient(circle, var(--white) 0%, #fdf2e9 100%);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--white);
            max-width: 700px;
            width: 100%;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            border: 1px solid rgba(184, 134, 11, 0.2);
            overflow: hidden;
            position: relative;
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Elegant Header & Image */
        .hero-section {
            background: linear-gradient(to bottom, #fff4e6, var(--white));
            padding: 40px 20px;
            border-bottom: 3px double var(--saffron);
        }

        .hero-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--saffron);
            box-shadow: 0 10px 20px rgba(255, 153, 51, 0.3);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Lora', serif;
            color: var(--deep-gold);
            font-size: 2rem;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .tagline {
            font-style: italic;
            color: #777;
            font-family: 'Lora', serif;
        }

        /* Quiz Logic UI */
        .content-padding { padding: 30px; }
        .hidden { display: none; }

        .btn-start {
            background: linear-gradient(45deg, var(--saffron), var(--accent));
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 87, 34, 0.4);
        }

        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 87, 34, 0.6); }

        .options-container { display: grid; gap: 15px; margin-top: 25px; }
        .option {
            padding: 15px 20px;
            border: 1px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--cream);
            font-weight: 500;
        }
        .option:hover { background: #fff4e6; border-color: var(--saffron); color: var(--accent); }
        .option.selected { background: var(--saffron); color: white; border-color: var(--saffron); }

        .timer { font-size: 1.2rem; font-weight: 600; color: var(--accent); margin-bottom: 10px; }
        
        /* Result Screen */
        .score-box { font-size: 3rem; color: var(--deep-gold); font-family: 'Lora', serif; margin: 20px 0; }
        .review-box { text-align: left; max-height: 400px; overflow-y: auto; margin-top: 20px; padding: 10px; background: #fafafa; border-radius: 15px; }
        .review-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .correct { color: #2e7d32; }
        .incorrect { color: #d32f2f; }

    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <div class="hero-section">
            <img src="Lord-Mahavira.jpg" alt="Lord Mahaveer" class="hero-image">
            <h1>Mahaveer Jayanti Quiz</h1>
            <p class="tagline">"Live and Let Live"</p>
        </div>
        <div class="content-padding">
            <p>Test your knowledge about the life and teachings of the 24th Tirthankara.</p>
            <p style="color: #888; font-size: 0.9rem;">10 Questions • 60 Seconds • Pure Knowledge</p>
            <button class="btn-start" onclick="startQuiz()">Begin the Journey</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden content-padding">
        <div class="timer" id="timer">Time: 60s</div>
        <div id="progress" style="margin-bottom: 20px; font-weight: bold;">Question 1/10</div>
        <h2 id="question-text" style="font-family: 'Lora', serif;"></h2>
        <div id="options-container" class="options-container"></div>
    </div>

    <div id="result-screen" class="hidden content-padding">
        <h1 style="color: var(--saffron)">Jai Jinendra!</h1>
        <p>You have successfully completed the quiz.</p>
        <div class="score-box" id="score-display">0/10</div>
        <button class="btn-start" onclick="showReview()">Review Answers</button>
        <button class="btn-start" style="background: #777; margin-top: 10px;" onclick="location.reload()">Play Again</button>
        
        <div id="review-list" class="review-box hidden"></div>
    </div>
</div>

<script>
    // EXPANDED QUESTION BANK (30 Questions)
    const questionBank = [
        { q: "Where was Lord Mahaveer born?", a: ["Vaishali", "Pavapuri", "Ayodhya", "Kashi"], cor: 0 },
        { q: "What was Lord Mahaveer's childhood name?", a: ["Siddharth", "Vardhaman", "Rahul", "Mahavira"], cor: 1 },
        { q: "Who was the mother of Lord Mahaveer?", a: ["Trishala Mata", "Marudevi Mata", "Vama Devi", "Sunanda"], cor: 0 },
        { q: "What was the name of Lord Mahaveer's father?", a: ["King Siddhartha", "King Nabhi", "King Ashwasena", "King Shudhodana"], cor: 0 },
        { q: "Lord Mahaveer was the ___ Tirthankara.", a: ["1st", "22nd", "23rd", "24th"], cor: 3 },
        { q: "What is the symbol (Lanchan) of Lord Mahaveer?", a: ["Bull", "Elephant", "Snake", "Lion"], cor: 3 },
        { q: "At what age did Lord Mahaveer renounce the world (Diksha)?", a: ["25", "30", "35", "40"], cor: 1 },
        { q: "At what age did Lord Mahaveer attain Nirvana?", a: ["72", "80", "100", "120"], cor: 0 },
        { q: "Lord Mahaveer attained Kevala Jnana under which tree?", a: ["Banyan", "Peepal", "Sal", "Mango"], cor: 2 },
        { q: "Where did Lord Mahaveer attain Nirvana?", a: ["Sammed Shikharji", "Girnar", "Pavapuri", "Palitana"], cor: 2 },
        { q: "Which of these is one of the 5 Great Vows (Mahavratas)?", a: ["Ahimsa", "Satya", "Asteya", "All of these"], cor: 3 },
        { q: "What does 'Ahimsa' mean?", a: ["Truth", "Non-stealing", "Non-violence", "Celibacy"], cor: 2 },
        { q: "What does 'Aparigraha' stand for?", a: ["Non-attachment", "Truth", "Non-violence", "Purity"], cor: 0 },
        { q: "Who was the first Ganadhara (disciple) of Lord Mahaveer?", a: ["Gautam Swami", "Sudharma Swami", "Jambu Swami", "Bahubali"], cor: 0 },
        { q: "In which state is the holy site of Pavapuri located?", a: ["Gujarat", "Rajasthan", "Bihar", "Uttar Pradesh"], cor: 2 },
        { q: "Lord Mahaveer belonged to which royal dynasty?", a: ["Ikshvaku", "Maurya", "Gupta", "Kshatriya (Jnatrika)"], cor: 3 },
        { q: "What is the name of Lord Mahaveer's daughter?", a: ["Priyadarsana", "Anoja", "Yashoda", "Both A & B"], cor: 3 },
        { q: "How many years did Lord Mahaveer spend in deep meditation before enlightenment?", a: ["12 years", "6 years", "1 year", "30 years"], cor: 0 },
        { q: "The term 'Jina' from which Jainism is derived means?", a: ["God", "The Conqueror", "The King", "The Teacher"], cor: 1 },
        { q: "Which Tirthankara preceded Lord Mahaveer (23rd)?", a: ["Rishabhdev", "Parshvanath", "Neminath", "Adinath"], cor: 1 },
        { q: "What is the primary holy scripture of Jainism?", a: ["Vedas", "Agamas", "Tripitakas", "Gita"], cor: 1 },
        { q: "Mahaveer Jayanti falls in which month of the Hindu calendar?", a: ["Chaitra", "Vaisakh", "Kartik", "Magh"], cor: 0 },
        { q: "Lord Mahaveer's first sermon was delivered at?", a: ["Vipulachala Hill", "Mount Abu", "Shatrunjay", "Sarnath"], cor: 0 },
        { q: "The three jewels of Jainism are collectively known as?", a: ["Triratna", "Trideva", "Triveni", "Trishakti"], cor: 0 },
        { q: "The Jain principle of 'Many-sidedness' of truth is called?", a: ["Anekantavada", "Syadvada", "Ahimsa", "Asteya"], cor: 0 },
        { q: "At what time of day was Lord Mahaveer born?", a: ["Morning", "Noon", "Midnight", "Brahma Muhurta (Dawn)"], cor: 3 },
        { q: "Who performed the first Abhishek of Balvardhaman on Mount Meru?", a: ["King Siddhartha", "Indra Dev", "Trishala Mata", "Devas"], cor: 1 },
        { q: "The white-clad sect of Jainism is known as?", a: ["Digambar", "Shvetambar", "Sthanakvasi", "Terapanthi"], cor: 1 },
        { q: "The sky-clad (nude) sect of Jainism is known as?", a: ["Shvetambar", "Digambar", "Murtipujaka", "None"], cor: 1 },
        { q: "What is the meaning of 'Asteya'?", a: ["Non-stealing", "Truth", "Non-violence", "Celibacy"], cor: 0 }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let timer;
    let timeLeft = 60;
    let userAnswers = [];

    function startQuiz() {
        // Randomize 10 questions from the 30 available
        currentQuestions = questionBank.sort(() => 0.5 - Math.random()).slice(0, 10);
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
        startTimer();
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = `Time Left: ${timeLeft}s`;
            if (timeLeft <= 0) endQuiz();
        }, 1000);
    }

    function loadQuestion() {
        const qData = currentQuestions[currentIndex];
        document.getElementById('progress').innerText = `Question ${currentIndex + 1} of 10`;
        document.getElementById('question-text').innerText = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData.a.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectOption(i);
            container.appendChild(div);
        });
    }

    function selectOption(index) {
        userAnswers[currentIndex] = index;
        if (currentIndex < 9) {
            currentIndex++;
            loadQuestion();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        clearInterval(timer);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        score = 0;
        userAnswers.forEach((ans, i) => {
            if (ans === currentQuestions[i].cor) score++;
        });
        document.getElementById('score-display').innerText = `${score}/10`;
    }

    function showReview() {
        const list = document.getElementById('review-list');
        list.classList.remove('hidden');
        list.innerHTML = '';
        currentQuestions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.cor;
            list.innerHTML += `
                <div class="review-item">
                    <p><strong>${i+1}. ${q.q}</strong></p>
                    <p class="${isCorrect ? 'correct' : 'incorrect'}">Your answer: ${q.a[userAnswers[i]] || 'No answer'}</p>
                    ${!isCorrect ? `<p class="correct">Correct: ${q.a[q.cor]}</p>` : ''}
                </div>
            `;
        });
    }
</script>

</body>
</html>
